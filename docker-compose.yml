name: seckill-system

services:
  mysql-master:
    image: mysql:8.0
    container_name: seckill-mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: commerce
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 15
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./mysql/master/conf.d/master.cnf:/etc/mysql/conf.d/master.cnf:ro
      - ./mysql/master/init:/docker-entrypoint-initdb.d:ro

  mysql-slave:
    image: mysql:8.0
    container_name: seckill-mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: commerce
    command: --default-authentication-plugin=mysql_native_password
    depends_on:
      mysql-master:
        condition: service_healthy
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 15
    volumes:
      - mysql_slave_data:/var/lib/mysql
      - ./mysql/slave/conf.d/slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
      - ./mysql/slave/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.7.1
    container_name: seckill-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  backend1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-backend1
    environment:
      DB_HOST: mysql-master
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: commerce
      DB_READ_HOST: mysql-master
      DB_READ_PORT: 3306
      DB_READ_USER: root
      DB_READ_PASSWORD: root123
      DB_READ_NAME: commerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ORDER_TOPIC: seckill-order-create
      KAFKA_CONSUMER_GROUP: seckill-order-workers
      SECRET_KEY: 3x@mpl3$$eCreT!Key2026$$gHjklQwErTyUiOpZxcVbnM9
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  backend2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-backend2
    environment:
      DB_HOST: mysql-master
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: commerce
      DB_READ_HOST: mysql-master
      DB_READ_PORT: 3306
      DB_READ_USER: root
      DB_READ_PASSWORD: root123
      DB_READ_NAME: commerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_ORDER_TOPIC: seckill-order-create
      KAFKA_CONSUMER_GROUP: seckill-order-workers
      SECRET_KEY: 3x@mpl3$$eCreT!Key2026$$gHjklQwErTyUiOpZxcVbnM9
    depends_on:
      mysql-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: seckill-nginx
    ports:
      - "80:80"
    depends_on:
      - backend1
      - backend2
    volumes:
      - ./nginx/docker.nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/static:/usr/share/nginx/html/static:ro

volumes:
  mysql_master_data:
  mysql_slave_data:
