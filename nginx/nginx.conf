# nginx.conf - 秒杀系统负载均衡与动静分离配置
# 适用于：E:\Study\第六学期课程\分布式\秒杀系统
# 修改日期：2026-03-28
#
# 使用说明：
# 1. 将此文件内容复制到你的 nginx 安装目录的 conf/nginx.conf
# 2. 根据实际情况调整路径和端口
# 3. 执行 nginx -t 检查语法
# 4. 执行 nginx -s reload 重新加载配置

user nginx;
worker_processes auto;
error_log logs/error.log warn;
pid logs/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # 日志格式定义（便于分析负载均衡分配）
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time urt=$upstream_response_time '
                    'us=$upstream_status uh=$upstream_addr';

    log_format load_balance '$remote_addr [$time_local] '
                           '"$request" $status '
                           'upstream_addr=$upstream_addr '
                           'response_time=$request_time';

    access_log logs/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ============================================================
    # 后端实例定义（upstream）
    # ============================================================

    # 轮询配置（Round Robin，默认）
    upstream seckill_backend_roundrobin {
        server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8082 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # 最少连接配置（Least Connections）
    upstream seckill_backend_leastconn {
        least_conn;
        server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8082 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ip_hash 配置（IP 哈希，同一客户端 IP 固定到同一实例）
    upstream seckill_backend_iphash {
        ip_hash;
        server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8082 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # 加权轮询配置（Weighted Round Robin）
    upstream seckill_backend_weighted {
        server 127.0.0.1:8081 weight=3 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8082 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ============================================================
    # Server 配置
    # ============================================================

    server {
        listen 80;
        server_name localhost;

        # ========== 静态资源直出（动静分离核心） ==========
        # 所有 /static/* 请求直接返回本地文件，不经过后端

        location /static/ {
            # 注意：Windows 路径需要正斜杠，末尾加 /
            alias E:/Study/第六学期课程/分布式/秒杀系统/frontend/static/;

            # 缓存策略
            expires 1h;
            add_header Cache-Control "public, max-age=3600";

            # 日志（可选，用于查看静态资源请求）
            access_log logs/static_access.log main;
        }

        # ========== 首页路由 ==========
        location = / {
            root E:/Study/第六学期课程/分布式/秒杀系统/frontend/static;
            index index.html;
            access_log logs/static_access.log main;
        }

        # ========== 动态 API 代理（改这里切换负载均衡算法） ==========
        # 默认使用轮询，要切换可改成：
        # - seckill_backend_leastconn （最少连接）
        # - seckill_backend_iphash （IP哈希）
        # - seckill_backend_weighted （加权轮询）

        location /api/ {
            # 改这个 upstream 名称来切换算法
            proxy_pass http://seckill_backend_roundrobin;

            # 代理头信息
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # HTTP 连接保活
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # 日志（专门记录 API 请求，便于验证负载均衡）
            access_log logs/api_access.log load_balance;
        }

        # ========== 错误页面 ==========
        error_page 404 =404 '{"code": 404, "message": "Not Found"}';
        error_page 500 502 503 504 =500 '{"code": 500, "message": "Server Error"}';

    }

    # ============================================================
    # 可选：另起一个 server 用于监控 Nginx 状态（不参与实验）
    # ============================================================
    # 取消注释即可使用 http://127.0.0.1:8888/nginx_status 查看

    # server {
    #     listen 8888;
    #     server_name localhost;
    #     location /nginx_status {
    #         stub_status on;
    #         access_log off;
    #     }
    # }
}
